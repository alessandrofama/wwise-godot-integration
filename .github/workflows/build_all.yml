name: Build

on:
  push:
    branches:
      - main
      - 'wwise_v*'
  pull_request:
    branches:
      - main
      - 'wwise_v*'
  workflow_dispatch:
    inputs:
      precision:
        description: 'Build precision (single or double)'
        required: false
        default: 'single'
        type: choice
        options:
        - single
        - double
env:
  BASE_BRANCH: ci
  WWISE_VERSION: "2026.1.1"
  WWISE_BUILD: "9196"
  GODOT_ENGINE_VERSION: "4.3"
  BUILD_PROFILE_EDITOR: "build_profile_editor.json"
  BUILD_PROFILE_RUNTIME: "build_profile_runtime.json"
  EM_VERSION: 4.0.20

jobs:
  build-all:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    env:
      BUILD_PRECISION: ${{ github.event.inputs.precision || 'single' }}
      PRECISION_SUFFIX: ${{ (github.event.inputs.precision || 'single') == 'double' && '-double' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: "windows-2022"
            sdk-platform: windows
            scons-platform: windows
            artifact-name: windows

          - name: macOS
            os: "macos-26"
            sdk-platform: mac
            scons-platform: macos
            artifact-name: macos

          - name: Linux
            os: "ubuntu-22.04"
            sdk-platform: linux
            scons-platform: linux
            artifact-name: linux

          - name: iOS
            os: "macos-26"
            sdk-platform: ios
            scons-platform: ios
            debug-flags: arch=arm64 ios_min_version=12.0
            release-flags: arch=arm64 ios_min_version=12.0
            artifact-name: ios

          - name: Android
            os: "ubuntu-22.04"
            sdk-platform: android
            scons-platform: android
            debug-flags-arm64: ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME arch=arm64
            release-flags-arm64: ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME arch=arm64
            debug-flags-arm32: ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME arch=arm32
            release-flags-arm32: ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME arch=arm32
            artifact-name: android-lib

          - name: Web
            os: "ubuntu-22.04"
            sdk-platform: web
            scons-platform: web
            artifact-name: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Checkout private scripts
        uses: actions/checkout@v3
        with:
          repository: alessandrofama/wwise-dl
          token: ${{ secrets.WWISE_DL_REPO_TOKEN }}
          path: ./addons/Wwise/native/tools/

      - name: Setup java
        uses: actions/setup-java@v3
        if: matrix.sdk-platform == 'android'
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android dependencies
        if: matrix.sdk-platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r23c
          link-to-sdk: true

      - name: Setup Emscripten 
        if: matrix.sdk-platform == 'web'
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: ${{ env.EM_VERSION }}
          no-cache: true

      - name: Wwise SDK cache
        id: cache-wwise-sdk
        uses: actions/cache@v3
        env:
          cache-name: cache-wwise-sdk
        with:
          path: addons/Wwise/native/wwise_sdk
          key: ${{ matrix.sdk-platform }}-build-${{ env.cache-name }}-${{ env.WWISE_VERSION }}

      # - name: Load .scons_cache directory
      #   id: cache-godot-extension
      #   uses: actions/cache@v3
      #   with:
      #     path: ${{github.workspace}}/.scons_cache/
      #     key: ${{matrix.sdk-platform}}-${{env.BASE_BRANCH}}-${{github.ref}}-${{github.sha}}
      #     restore-keys: |
      #       ${{matrix.sdk-platform}}-${{env.BASE_BRANCH}}-${{github.ref}}-${{github.sha}}
      #       ${{matrix.sdk-platform}}-${{env.BASE_BRANCH}}-${{github.ref}}
      #       ${{matrix.sdk-platform}}-${{env.BASE_BRANCH}}

      - name: Set up Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"
          architecture: "x64"

      - name: Set up dependencies (Python, SCons)
        run: python -m pip install scons==4.7.0 requests tqdm

      - name: Set up Linux dependencies
        if: runner.os == 'Linux' && matrix.sdk-platform == 'linux'
        run: |
          sudo apt-get install build-essential pkg-config libx11-dev \
            yasm zip gcc-11 g++-11 libtbb-dev

      - name: Prepare SDK (Windows)
        if: runner.os == 'Windows' && steps.cache-wwise-sdk.outputs.cache-hit != 'true'
        run: |
            python ./addons/Wwise/native/tools/wwise-dl.py --user ${{ secrets.AK_USER }} --pass ${{ secrets.AK_PASS }} ${{ env.WWISE_VERSION }}.${{ env.WWISE_BUILD }} Windows_vc170 --plugins Auro ConvolutionReverb iZotope McDSP Reflect SoundSeed SoundSeedGrain ResonanceAudio Motion ASIO AkChannelRouter MasteringSuite CrankcaseAudioREVModelPlayer Impacter --output ./addons/Wwise/native/wwise_sdk/

      - name: Prepare SDK (macOS)
        if: runner.os == 'MacOS' && matrix.sdk-platform == 'mac' && steps.cache-wwise-sdk.outputs.cache-hit != 'true'
        run: |
            python ./addons/Wwise/native/tools/wwise-dl.py --user ${{ secrets.AK_USER }} --pass ${{ secrets.AK_PASS }} ${{ env.WWISE_VERSION }}.${{ env.WWISE_BUILD }} Mac --plugins Auro ConvolutionReverb iZotope McDSP Reflect SoundSeed SoundSeedGrain ResonanceAudio Motion ASIO AkChannelRouter MasteringSuite CrankcaseAudioREVModelPlayer Impacter --output ./addons/Wwise/native/wwise_sdk/

      - name: Prepare SDK (Linux)
        if: runner.os == 'Linux' && matrix.sdk-platform == 'linux' && steps.cache-wwise-sdk.outputs.cache-hit != 'true'
        run: |
            python ./addons/Wwise/native/tools/wwise-dl.py --user ${{ secrets.AK_USER }} --pass ${{ secrets.AK_PASS }} ${{ env.WWISE_VERSION }}.${{ env.WWISE_BUILD }} Linux --plugins Auro ConvolutionReverb iZotope McDSP Reflect SoundSeed SoundSeedGrain ResonanceAudio Motion ASIO AkChannelRouter MasteringSuite CrankcaseAudioREVModelPlayer Impacter --output ./addons/Wwise/native/wwise_sdk/

      - name: Prepare SDK (iOS)
        if: runner.os == 'MacOS' && matrix.sdk-platform == 'ios' && steps.cache-wwise-sdk.outputs.cache-hit != 'true'
        run: |
            python ./addons/Wwise/native/tools/wwise-dl.py --user ${{ secrets.AK_USER }} --pass ${{ secrets.AK_PASS }} ${{ env.WWISE_VERSION }}.${{ env.WWISE_BUILD }} iOS --plugins Auro ConvolutionReverb iZotope McDSP Reflect SoundSeed SoundSeedGrain ResonanceAudio Motion ASIO AkChannelRouter MasteringSuite CrankcaseAudioREVModelPlayer Impacter --output ./addons/Wwise/native/wwise_sdk/

      - name: Prepare SDK (Android)
        if: runner.os == 'Linux' && matrix.sdk-platform == 'android' && steps.cache-wwise-sdk.outputs.cache-hit != 'true'
        run: |
            python ./addons/Wwise/native/tools/wwise-dl.py --user ${{ secrets.AK_USER }} --pass ${{ secrets.AK_PASS }} ${{ env.WWISE_VERSION }}.${{ env.WWISE_BUILD }} Android --plugins Auro ConvolutionReverb iZotope McDSP Reflect SoundSeed SoundSeedGrain ResonanceAudio Motion ASIO AkChannelRouter MasteringSuite CrankcaseAudioREVModelPlayer Impacter --output ./addons/Wwise/native/wwise_sdk/
      
      - name: Prepare SDK (Web)
        if: runner.os == 'Linux' && matrix.sdk-platform == 'web' && steps.cache-wwise-sdk.outputs.cache-hit != 'true'
        run: |
            python ./addons/Wwise/native/tools/wwise-dl.py --user ${{ secrets.AK_USER }} --pass ${{ secrets.AK_PASS }} ${{ env.WWISE_VERSION }}.${{ env.WWISE_BUILD }} Emscripten --plugins ConvolutionReverb Reflect SoundSeed SoundSeedGrain MasteringSuite Impacter --output ./addons/Wwise/native/wwise_sdk/

      - name: Compile editor library
        if: matrix.sdk-platform != 'android' && matrix.sdk-platform != 'ios' && matrix.sdk-platform != 'web'
        shell: bash
        env:
          SCONS_CACHE: ${{github.workspace}}/.scons_cache/
          SCONS_CACHE_LIMIT: 7168
        run: |
          cd addons/Wwise/native
          mkdir -p godot-cpp/bin
          scons platform=${{ matrix.scons-platform }} target=editor wwise_config=profile use_static_cpp=yes wwise_sdk=wwise_sdk/SDK build_profile=${{ env.BUILD_PROFILE_EDITOR }} precision=${{ env.BUILD_PRECISION }}
          cd ../../../

      - name: Compile template_debug library
        if: matrix.sdk-platform != 'android' && matrix.sdk-platform != 'web'
        shell: bash
        env:
          SCONS_CACHE: ${{github.workspace}}/.scons_cache/
          SCONS_CACHE_LIMIT: 7168
        run: |
          cd addons/Wwise/native
          scons platform=${{ matrix.scons-platform }} target=template_debug wwise_config=profile use_static_cpp=yes wwise_sdk=wwise_sdk/SDK build_profile=${{ env.BUILD_PROFILE_RUNTIME }} ${{ matrix.debug-flags }} precision=${{ env.BUILD_PRECISION }}
          cd ../../../

      - name: Compile template_release library
        if: matrix.sdk-platform != 'android' && matrix.sdk-platform != 'web'
        shell: bash
        env:
          SCONS_CACHE: ${{github.workspace}}/.scons_cache/
          SCONS_CACHE_LIMIT: 7168
        run: |
          cd addons/Wwise/native
          scons platform=${{ matrix.scons-platform }} target=template_release wwise_config=release use_static_cpp=yes wwise_sdk=wwise_sdk/SDK build_profile=${{ env.BUILD_PROFILE_RUNTIME }} ${{ matrix.release-flags }} precision=${{ env.BUILD_PRECISION }}
          cd ../../../

      - name: Compile Android libraries
        if: matrix.sdk-platform == 'android'
        shell: bash
        run: |
          cd addons/Wwise/native/wwise_sdk/SDK
          WWISESDK=$(pwd)
          cd ../../godot-cpp
          mkdir -p bin
          scons platform=android target=template_debug dev_build=yes build_profile="../build_profile_runtime.json" -j6 ${{ matrix.debug-flags-arm64 }} precision=${{ env.BUILD_PRECISION }}
          scons platform=android target=template_debug dev_build=yes build_profile="../build_profile_runtime.json" -j6 ${{ matrix.debug-flags-arm32 }} precision=${{ env.BUILD_PRECISION }}
          scons platform=android target=template_release build_profile="../build_profile_runtime.json" -j6 ${{ matrix.release-flags-arm64 }} precision=${{ env.BUILD_PRECISION }}
          scons platform=android target=template_release build_profile="../build_profile_runtime.json" -j6 ${{ matrix.release-flags-arm32 }} precision=${{ env.BUILD_PRECISION }}
          cd ../android
          chmod +x ./gradlew
          ./gradlew assemble -PWWISE_SDK="$WWISESDK" -Pprecision=${{ env.BUILD_PRECISION }}

      - name: Compile Web libraries
        if: matrix.sdk-platform == 'web'
        shell: bash
        env:
          SCONS_CACHE: ${{github.workspace}}/.scons_cache/
          SCONS_CACHE_LIMIT: 7168
        run: |
          cd addons/Wwise/native

          for threads in no yes; do
            scons platform=${{ matrix.scons-platform }} \
              target=template_debug \
              wwise_config=profile \
              wwise_sdk=wwise_sdk/SDK \
              build_profile=${{ env.BUILD_PROFILE_RUNTIME }} \
              precision=${{ env.BUILD_PRECISION }} \
              plugins=reflect,convolution,soundseed_grain,soundseed_air,mastering_suite \
              threads=$threads

            scons platform=${{ matrix.scons-platform }} \
              target=template_release \
              wwise_config=release \
              wwise_sdk=wwise_sdk/SDK \
              build_profile=${{ env.BUILD_PROFILE_RUNTIME }} \
              precision=${{ env.BUILD_PRECISION }} \
              plugins=reflect,convolution,soundseed_grain,soundseed_air,mastering_suite \
              threads=$threads
          done

          cd ../../../

      - name: Upload libs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}${{ env.PRECISION_SUFFIX }}
          path: addons/Wwise/native/lib

  upload-addon:
    runs-on: "ubuntu-22.04"
    needs: [build-all]
    name: Addon
    env:
      PRECISION_SUFFIX: ${{ (github.event.inputs.precision || 'single') == 'double' && '-double' || '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download all libs
        uses: actions/download-artifact@v4

      - name: Assemble all artifacts
        run: |
          ls -R
          shopt -s dotglob
          if [ ! -d "addons/Wwise/native/lib" ]; then
          mkdir -p addons/Wwise/native/lib
          fi
          if [ -d windows${{ env.PRECISION_SUFFIX }} ]; then
            mv windows${{ env.PRECISION_SUFFIX }}/* addons/Wwise/native/lib/
            rm -r windows${{ env.PRECISION_SUFFIX }}
          fi
          if [ -d macos${{ env.PRECISION_SUFFIX }} ]; then
            mv macos${{ env.PRECISION_SUFFIX }}/* addons/Wwise/native/lib/
            rm -r macos${{ env.PRECISION_SUFFIX }}
          fi
          if [ -d linux${{ env.PRECISION_SUFFIX }} ]; then
            mv linux${{ env.PRECISION_SUFFIX }}/* addons/Wwise/native/lib/
            rm -r linux${{ env.PRECISION_SUFFIX }}
          fi
          if [ -d android-lib${{ env.PRECISION_SUFFIX }} ]; then
            mv android-lib${{ env.PRECISION_SUFFIX }}/* addons/Wwise/native/lib/
            rm -r android-lib${{ env.PRECISION_SUFFIX }}
          fi
          if [ -d ios${{ env.PRECISION_SUFFIX }} ]; then
            mv ios${{ env.PRECISION_SUFFIX }}/* addons/Wwise/native/lib/
            rm -r ios${{ env.PRECISION_SUFFIX }}
          fi
          if [ -d web${{ env.PRECISION_SUFFIX }} ]; then
            mv web${{ env.PRECISION_SUFFIX }}/* addons/Wwise/native/lib/
            rm -r web${{ env.PRECISION_SUFFIX }}
          fi

      - name: Clean up addon
        run: |
          rm -r ./addons/Wwise/native/godot-cpp
          rm -r ./addons/Wwise/native/src
          rm -r ./addons/Wwise/native/vs2022
          rm -r ./addons/Wwise/native/android
          rm -r ./addons/Wwise/native/linux
          rm -r ./addons/Wwise/native/doc_classes
          rm ./addons/Wwise/native/SConstruct
          rm ./addons/Wwise/native/build_profile_editor.json
          rm ./addons/Wwise/native/build_profile_runtime.json
          rm ./LICENSE
          rm ./README.md
          rm .gitattributes
          rm .gitmodules
          rm -r ./.git
          rm -r ./.github
          rm -r ./tests

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: wwise-${{ env.WWISE_VERSION }}-for-godot-${{ env.GODOT_ENGINE_VERSION }}${{ env.PRECISION_SUFFIX }}
          path: ./